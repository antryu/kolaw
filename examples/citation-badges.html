<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>kolaw — Citation Badges Demo (Mike-style)</title>
<style>
  body {
    font-family: -apple-system, "SF Pro Text", "Apple SD Gothic Neo", sans-serif;
    max-width: 760px; margin: 40px auto; padding: 0 16px; color: #111827;
    background: #f9fafb;
  }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .sub { color: #6b7280; font-size: 13px; margin-bottom: 24px; }
  form { display: flex; gap: 8px; margin-bottom: 24px; }
  input {
    flex: 1; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px;
    font: inherit; outline: none;
  }
  input:focus { border-color: #111827; }
  button {
    padding: 10px 18px; background: #111827; color: white; border: 0;
    border-radius: 8px; cursor: pointer; font: inherit;
  }
  button:disabled { background: #9ca3af; cursor: not-allowed; }

  .answer {
    background: white; border: 1px solid #e5e7eb; border-radius: 12px;
    padding: 18px 20px; margin-bottom: 16px; line-height: 1.7;
    font-size: 14px;
  }
  .answer .meta { color: #6b7280; font-size: 12px; margin-bottom: 10px; }
  .answer .verdict {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600; margin-right: 8px;
  }
  .verdict-applies      { background: #dcfce7; color: #166534; }
  .verdict-ambiguous    { background: #fef3c7; color: #92400e; }
  .verdict-does_not_apply { background: #fee2e2; color: #991b1b; }

  /* Mike-style citation badge — ① ② ③ inline number bubbles */
  .cite {
    display: inline-flex; align-items: center; justify-content: center;
    background: #e5e7eb; color: #374151;
    width: 16px; height: 16px; border-radius: 999px;
    font-size: 10px; font-weight: 600; vertical-align: super;
    margin: 0 2px; cursor: pointer; transition: background-color .15s;
    text-decoration: none;
  }
  .cite:hover { background: #111827; color: white; }

  .citations-list {
    background: white; border: 1px solid #e5e7eb; border-radius: 12px;
    padding: 14px 16px; font-size: 13px;
  }
  .citations-list h3 { margin: 0 0 10px; font-size: 12px; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .citation-item {
    display: flex; gap: 10px; padding: 8px 0; border-top: 1px solid #f3f4f6;
  }
  .citation-item:first-of-type { border-top: 0; }
  .citation-num {
    flex-shrink: 0; width: 20px; height: 20px; border-radius: 999px;
    background: #f3f4f6; color: #374151;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
  }
  .citation-body { flex: 1; }
  .citation-name { font-weight: 600; }
  .citation-tag {
    display: inline-block; padding: 1px 6px; border-radius: 4px;
    background: #f3f4f6; color: #6b7280;
    font-size: 10px; margin-left: 6px;
  }
  .citation-excerpt { color: #6b7280; font-size: 12px; margin-top: 2px; line-height: 1.5; }
  .err { color: #b91c1c; }
</style>
</head>
<body>
  <h1>kolaw — Citation Badges Demo</h1>
  <p class="sub">
    Mike 스타일 인용 뱃지 패턴을 kolaw <code>/search</code> 응답에 적용한 예시.
    각 답변 옆 ① ② ③ 뱃지를 호버하면 출처 미리보기, 클릭하면 법제처로 이동.
  </p>

  <form id="f">
    <input id="q" placeholder="예: 의료법 진료기록 / 부당해고 / 개인정보 보호" autofocus />
    <button id="go">검색</button>
  </form>

  <div id="out"></div>

<script type="module">
const KOLAW_URL = (
  new URLSearchParams(location.search).get("kolaw") ||
  localStorage.kolaw_url ||
  "http://localhost:8100"
).replace(/\/+$/, "");

const $ = (s) => document.querySelector(s);

$("#f").addEventListener("submit", async (e) => {
  e.preventDefault();
  const q = $("#q").value.trim();
  if (!q) return;
  $("#go").disabled = true;
  $("#out").innerHTML = `<div class="answer">검색 중…</div>`;
  try {
    const r = await fetch(`${KOLAW_URL}/search`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: q, mode: "fast" }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    render(q, data);
  } catch (err) {
    $("#out").innerHTML = `<div class="answer err">검색 실패: ${err.message}<br>kolaw가 ${KOLAW_URL} 에 떠 있나요? URL 변경: <code>?kolaw=http://...</code></div>`;
  } finally {
    $("#go").disabled = false;
  }
});

function render(q, data) {
  const cits = data.citations || [];
  const verdict = data.verdict || "ambiguous";

  // Compose a one-line answer that *embeds* numbered citations.
  // In real production, your LLM would emit this paragraph.
  // For the demo we generate a plain summary and append §N§ for each citation.
  const summary = cits.length
    ? `질문 "<b>${escape(q)}</b>"에 대해 ${cits.length}건의 관련 자료를 찾았습니다 ` +
      cits.map((_, i) => citeBadge(i)).join("")
    : "관련 결과가 없습니다.";

  const citationsHtml = cits.length
    ? `<div class="citations-list">
        <h3>출처 (${cits.length})</h3>
        ${cits.map((c, i) => citationItem(c, i)).join("")}
      </div>`
    : "";

  $("#out").innerHTML = `
    <div class="answer">
      <div class="meta">
        <span class="verdict verdict-${verdict}">${verdict}</span>
        confidence: ${(data.confidence * 100).toFixed(0)}% · mode: ${data.mode}
      </div>
      <div class="answer-body">${summary}</div>
    </div>
    ${citationsHtml}
  `;

  document.querySelectorAll(".cite").forEach((el) => {
    el.addEventListener("mouseenter", () => {
      const idx = +el.dataset.idx;
      el.title = `${cits[idx].law_name} · ${cits[idx].article} · ${cits[idx].excerpt.slice(0, 80)}…`;
    });
  });
}

function citeBadge(i) {
  return `<a class="cite" data-idx="${i}" href="#c${i}">${i + 1}</a>`;
}

function citationItem(c, i) {
  return `
    <div class="citation-item" id="c${i}">
      <div class="citation-num">${i + 1}</div>
      <div class="citation-body">
        <span class="citation-name">${escape(c.law_name)}</span>
        <span class="citation-tag">${escape(c.article)}</span>
        ${c.version ? `<span class="citation-tag">시행 ${escape(c.version)}</span>` : ""}
        <div class="citation-excerpt">${escape((c.excerpt || "").slice(0, 240))}…</div>
      </div>
    </div>
  `;
}

function escape(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}
</script>
</body>
</html>
