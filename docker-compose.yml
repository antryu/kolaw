services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    environment:
      - PORT=8100
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - LOCAL_LLM_BASE_URL=http://host.docker.internal:8080/v1
      - LOCAL_LLM_MODEL=qwen3:32b
      - ALLOW_ANTHROPIC=0
      # LEGALIZE_KR_PATH: inside Docker, mount host corpus or set to /data/legalize-kr
      - LEGALIZE_KR_PATH=/data/legalize-kr
    volumes:
      - ~/Thairon/legalize-kr:/data/legalize-kr:ro
    depends_on:
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8900:8000"  # host:container (8900 to avoid collision)
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  chroma_data:
